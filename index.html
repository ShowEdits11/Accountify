function updatePurchaseReceivePreview(){
  const accId = document.getElementById('pReceiveAccount').value;
  const wrap = document.getElementById('pReceiveWrap');
  const noteWrap = document.getElementById('pReceiveNoteWrap');
  if(!accId){ wrap.style.display='none'; noteWrap.style.display='none'; return; }
  wrap.style.display='';
  const acc = getAccount(accId);
  document.getElementById('pReceiveCurLabel').textContent = '('+acc.currency+')';
  const amount = Number(document.getElementById('pAmount').value)||0;
  const receiveNative = Number(document.getElementById('pReceiveAmount').value)||0;
  const receiveNPR = receiveNative*acc.rate;
  const note = document.getElementById('pReceiveNote');
  if(receiveNative>0){
    noteWrap.style.display='';
    const spread = amount - receiveNPR;
    let msg = '≈ '+fmtNPR(receiveNPR)+' worth received into '+escapeHtml(acc.name)+'.';
    if(Math.abs(spread)>0.5){
      msg += spread>0 ? (' Remaining '+fmtNPR(spread)+' recorded as a cost (exchange fee/spread) — not the full purchase amount.') : (' You are receiving '+fmtNPR(-spread)+' more value than the purchase amount — recorded as a gain.');
    } else {
      msg += ' A clean asset swap — no extra cost recorded beyond this.';
    }
    note.textContent = msg;
  } else {
    noteWrap.style.display='none';
  }
}
function submitPurchase(){
  const date=document.getElementById('pDate').value;
  const supplier=document.getElementById('pSupplier').value.trim();
  const description=document.getElementById('pDescription').value;
  const amount=Number(document.getElementById('pAmount').value);
  const accountId=document.getElementById('pAccount').value || null;
  const paid=accountId?(Number(document.getElementById('pPaid').value)||0):0;
  const dueDate=document.getElementById('pDueDate').value;
  const notes=document.getElementById('pNotes').value;
  const receiveAccountId=document.getElementById('pReceiveAccount').value || null;
  const receiveNative=receiveAccountId?(Number(document.getElementById('pReceiveAmount').value)||0):0;
  const err=document.getElementById('pError');
  if(!date||!supplier||!amount||amount<=0){ err.textContent='Please fill in date, supplier name and a valid purchase amount.'; return; }
  if(paid<0){ err.textContent='Paid amount cannot be negative.'; return; }
  if(receiveAccountId){
    if(!accountId){ err.textContent='A "Receive Into" purchase needs a "Paid From" account too — it is an exchange between two of your accounts.'; return; }
    if(paid<=0){ err.textContent='Please enter the amount paid for this exchange.'; return; }
    if(receiveNative<=0){ err.textContent='Please enter the amount received into "'+escapeHtml(getAccount(receiveAccountId).name)+'".'; return; }
    if(receiveAccountId===accountId){ err.textContent='"Paid From" and "Receive Into" must be different accounts.'; return; }
  }
  addPurchase({date:date,supplier:supplier,description:description,amount:amount,paidNative:paid,accountId:accountId,dueDate:dueDate,notes:notes,receiveAccountId:receiveAccountId,receiveNative:receiveNative});
  toast('Purchase recorded','success');
  err.textContent='';
  renderNewEntryBody();
}

function updateCurLabelAndConvert(accSelId, labelId, amtId, noteId){
  const accId=document.getElementById(accSelId).value;
  const labelEl=document.getElementById(labelId), noteEl=document.getElementById(noteId);
  if(!accId){ labelEl.textContent=''; noteEl.textContent=''; return; }
  const acc=getAccount(accId);
  labelEl.textContent='('+acc.currency+')';
  const amt=Number(document.getElementById(amtId).value)||0;
  noteEl.textContent = acc.currency!==baseCurrency() ? ('≈ '+fmtNPR(amt*acc.rate)+' at rate '+fmtNum(acc.rate)) : '';

function submitCashTx(kind){
  const p = kind==='in'?'ci':'co';
  const date=document.getElementById(p+'Date').value;
  const accountId=document.getElementById(p+'Account').value;
  const category=resolveCategory(p+'Category');
  const amount=Number(document.getElementById(p+'Amount').value);
  const note=document.getElementById(p+'Note').value;
  const err=document.getElementById(p+'Error');
  if(!date||!accountId){ err.textContent='Please select a date and account.'; return; }
  if(!category){ err.textContent='Please choose or enter a category.'; return; }
  if(!amount||amount<=0){ err.textContent='Please enter a valid amount greater than 0.'; return; }
  if(kind==='out'){
    const acc=getAccount(accountId);
    const availNative = accountBalanceNative(accountId);
    if(amount > availNative + 0.01){
      if(!confirm('This will make "'+acc.name+'" go negative ('+fmtNative(availNative-amount,acc.currency)+'). Continue anyway?')) return;
    }
  }
  addCashTx({kind:kind,date:date,accountId:accountId,category:category,amount:amount,note:note});
  toast('Transaction recorded','success');
  err.textContent='';
  renderCashTxBody();
}

      '<div class="field"><label>Amount to Receive <span id="tToCurLabel" class="text-dim"></span></label><input type="number" id="tToAmount" min="0" step="0.01" placeholder="0.00" oninput="onTransferAmountManualEdit()"></div>'+

let transferToManuallyEdited=false;
function onTransferChange(){ transferToManuallyEdited=false; recalcTransferPreview(); }
function onTransferAmountManualEdit(){ transferToManuallyEdited=true; recalcTransferPreview(); }
function recalcTransferPreview(){
  const fromId=document.getElementById('tFrom').value, toId=document.getElementById('tTo').value;
  const fromAcc=getAccount(fromId), toAcc=getAccount(toId);
  document.getElementById('tFromCurLabel').textContent = fromAcc?('('+fromAcc.currency+')'):'';
  document.getElementById('tToCurLabel').textContent = toAcc?('('+toAcc.currency+')'):'';
  const fromAmount=Number(document.getElementById('tFromAmount').value)||0;
  const note=document.getElementById('tConvertNote');
  if(!fromAcc||!toAcc){ note.textContent=''; note.style.color=''; return; }
  if(!transferToManuallyEdited){
    const nprValue = fromAmount*fromAcc.rate;
    const autoTo = toAcc.rate ? nprValue/toAcc.rate : 0;
    document.getElementById('tToAmount').value = autoTo ? autoTo.toFixed(2) : '';
  }
  const toAmount=Number(document.getElementById('tToAmount').value)||0;
  const sentNPR=fromAmount*fromAcc.rate, recvNPR=toAmount*toAcc.rate;
  const diff=sentNPR-recvNPR;
  if(Math.abs(diff)<0.5){ note.innerHTML = (fromAcc.currency!==toAcc.currency) ? ('Fair value at current rates ≈ '+fmtNPR(sentNPR)) : ''; note.style.color=''; }
  else if(diff>0){ note.innerHTML = 'Sending ≈ '+fmtNPR(sentNPR)+', receiving ≈ '+fmtNPR(recvNPR)+' — <strong style="color:var(--red)">'+fmtNPR(diff)+' will be recorded as a transfer fee/loss</strong>'; }
  else { note.innerHTML = 'Sending ≈ '+fmtNPR(sentNPR)+', receiving ≈ '+fmtNPR(recvNPR)+' — <strong style="color:var(--green)">'+fmtNPR(-diff)+' will be recorded as an exchange gain</strong>'; }
}
function submitTransfer(){
  const date=document.getElementById('tDate').value;
  const fromAccountId=document.getElementById('tFrom').value, toAccountId=document.getElementById('tTo').value;
  const fromAmount=Number(document.getElementById('tFromAmount').value);
  const toAmount=Number(document.getElementById('tToAmount').value);
  const note=document.getElementById('tNote').value;
  const err=document.getElementById('tError');
  if(!date||!fromAccountId||!toAccountId){ err.textContent='Please select a date, from account and to account.'; return; }
  if(fromAccountId===toAccountId){ err.textContent='From and To accounts must be different.'; return; }
  if(!fromAmount||fromAmount<=0||!toAmount||toAmount<=0){ err.textContent='Please enter valid amounts greater than 0.'; return; }
  const fromAcc=getAccount(fromAccountId);
  const availNative=accountBalanceNative(fromAccountId);
  if(fromAmount>availNative+0.01){
    if(!confirm('This will make "'+fromAcc.name+'" go negative. Continue anyway?')) return;
  }
  addTransfer({date:date,fromAccountId:fromAccountId,toAccountId:toAccountId,fromAmount:fromAmount,toAmount:toAmount,note:note});
  toast('Transfer recorded','success');
  err.textContent='';
  transferToManuallyEdited=false;
  renderCashTxBody();
}

function renderMoneyFlowBody(){
  const from=document.getElementById('mfFrom').value, to=document.getElementById('mfTo').value, accF=document.getElementById('mfAccount').value;
  const res=moneyFlowTotals(from||null,to||null);
  let events=res.events;
  if(accF) events=events.filter(function(e){ return e.accountId===accF; });
  const totalIn=events.filter(function(e){ return e.direction==='in'; }).reduce(function(s,e){ return s+e.amountNPR; },0);
  const totalOut=events.filter(function(e){ return e.direction==='out'; }).reduce(function(s,e){ return s+e.amountNPR; },0);
  const rows=events.map(function(e){
    const acc=getAccount(e.accountId);
    return '<tr><td>'+fmtDate(e.date)+'</td><td><span class="badge '+(e.direction==='in'?'badge-green':'badge-red')+'">'+(e.direction==='in'?'In':'Out')+'</span></td>'+
      '<td>'+escapeHtml(e.label||'')+'</td><td>'+(acc?escapeHtml(acc.name):'—')+'</td>'+
      '<td class="num '+(e.direction==='in'?'text-green':'text-red')+'">'+(e.direction==='in'?'+':'-')+fmtNPR(e.amountNPR)+'</td></tr>';
  }).join('');
  document.getElementById('moneyFlowBody').innerHTML=
    '<div class="summary-strip">'+
      '<div class="summary-chip"><div class="l">Money In</div><div class="v text-green">'+fmtNPR(totalIn)+'</div></div>'+
      '<div class="summary-chip"><div class="l">Money Out</div><div class="v text-red">'+fmtNPR(totalOut)+'</div></div>'+
      '<div class="summary-chip"><div class="l">Net Flow</div><div class="v '+(totalIn-totalOut>=0?'text-green':'text-red')+'">'+fmtNPR(totalIn-totalOut)+'</div></div>'+
    '</div>'+
    '<div class="table-wrap"><table><thead><tr><th>Date</th><th>Direction</th><th>Description</th><th>Account</th><th class="num">Amount</th></tr></thead>'+
    '<tbody>'+(rows||'<tr class="empty-row"><td colspan="5">No transactions match this filter.</td></tr>')+'</tbody></table></div>';
}
function exportMoneyFlowCSV(){
  const from=document.getElementById('mfFrom').value, to=document.getElementById('mfTo').value, accF=document.getElementById('mfAccount').value;
  const res=moneyFlowTotals(from||null,to||null);

function renderDueReport(){
  const el=document.getElementById('page-due-report');
  const receivables=[], payables=[];
  state.sales.forEach(function(s){ const d=saleDue(s); if(d>0.004) receivables.push({refType:'sale',refId:s.id,party:s.customer,date:s.date,dueDate:s.dueDate,total:s.amount,remaining:d}); });
  state.credits.filter(function(c){ return c.type==='given'; }).forEach(function(c){ const d=creditDue(c); if(d>0.004) receivables.push({refType:'credit',refId:c.id,party:c.party,date:c.date,dueDate:c.dueDate,total:c.amount,remaining:d}); });
  state.purchases.forEach(function(p){ const d=purchaseDue(p); if(d>0.004) payables.push({refType:'purchase',refId:p.id,party:p.supplier,date:p.date,dueDate:p.dueDate,total:p.amount,remaining:d}); });
  state.credits.filter(function(c){ return c.type==='taken'; }).forEach(function(c){ const d=creditDue(c); if(d>0.004) payables.push({refType:'credit',refId:c.id,party:c.party,date:c.date,dueDate:c.dueDate,total:c.amount,remaining:d}); });
  const totalRec=receivables.reduce(function(s,r){ return s+r.remaining; },0);
  const totalPay=payables.reduce(function(s,r){ return s+r.remaining; },0);
  const dueAnalysis = svgDonutChart([{label:'Receivable', value:totalRec},{label:'Payable', value:totalPay}], {palette:['var(--green)','var(--red)'], emptyMsg:'No outstanding dues right now'});
  el.innerHTML =
    printHeaderHtml('Due Report')+
    '<div class="summary-strip">'+
      '<div class="summary-chip"><div class="l">Total Receivable</div><div class="v text-green">'+fmtNPR(totalRec)+'</div></div>'+
      '<div class="summary-chip"><div class="l">Total Payable</div><div class="v text-red">'+fmtNPR(totalPay)+'</div></div>'+
      '<div class="summary-chip"><div class="l">Net Due Position</div><div class="v '+(totalRec-totalPay>=0?'text-green':'text-red')+'">'+fmtNPR(totalRec-totalPay)+'</div></div>'+
      '<div style="align-self:center" class="btn-group"><button class="btn" onclick="exportDueCSV()">'+icon('download')+' Export CSV</button><button class="btn" onclick="downloadReportPDF(\'due\')">'+icon('download')+' Due PDF</button><button class="btn" onclick="downloadReportPDF(\'credit\')">'+icon('download')+' Credit PDF</button><button class="btn" onclick="window.print()">Print</button></div>'+
    '</div>'+
    chartCard('Due Analysis', dueAnalysis, 'Receivable vs payable')+
    '<div class="ledger-section-title">Receivables — money owed to you</div>'+dueTableHtml(receivables,'green')+
    '<div class="ledger-section-title">Payables — money you owe</div>'+dueTableHtml(payables,'red');
}
function dueTableHtml(list, tone){
  if(!list.length) return '<div class="empty-state" style="padding:26px"><p>Nothing outstanding here.</p></div>';
  const today=todayISO();
  const rows=list.slice().sort(function(a,b){ return (a.dueDate||'9999')<(b.dueDate||'9999')?-1:1; }).map(function(r){
    const overdue = r.dueDate && r.dueDate<today;
    return '<tr><td>'+escapeHtml(r.party)+'</td><td>'+fmtDate(r.date)+'</td>'+
      '<td>'+(r.dueDate?fmtDate(r.dueDate):'—')+' '+(overdue?'<span class="badge badge-red">Overdue</span>':'')+'</td>'+
      '<td class="num">'+fmtNPR(r.total)+'</td><td class="num" style="color:var(--'+tone+')">'+fmtNPR(r.remaining)+'</td>'+
      '<td><button class="btn btn-sm btn-primary" onclick="openSettleModal(\''+r.refType+'\',\''+r.refId+'\')">Record Payment</button></td></tr>';
  }).join('');
  return '<div class="table-wrap"><table><thead><tr><th>Party</th><th>Date</th><th>Due Date</th><th class="num">Total</th><th class="num">Remaining</th><th></th></tr></thead><tbody>'+rows+'</tbody></table></div>';
}
function exportDueCSV(){
  const rows=[['Kind','Source','Party','Date','Due Date','Total ('+baseCurrency()+')','Remaining ('+baseCurrency()+')']];
  state.sales.forEach(function(s){ const d=saleDue(s); if(d>0.004) rows.push(['Receivable','Sale',s.customer,s.date,s.dueDate||'',s.amount,d.toFixed(2)]); });
  state.credits.filter(function(c){ return c.type==='given'; }).forEach(function(c){ const d=creditDue(c); if(d>0.004) rows.push(['Receivable','Credit',c.party,c.date,c.dueDate||'',c.amount,d.toFixed(2)]); });
  state.purchases.forEach(function(p){ const d=purchaseDue(p); if(d>0.004) rows.push(['Payable','Purchase',p.supplier,p.date,p.dueDate||'',p.amount,d.toFixed(2)]); });
  state.credits.filter(function(c){ return c.type==='taken'; }).forEach(function(c){ const d=creditDue(c); if(d>0.004) rows.push(['Payable','Credit',c.party,c.date,c.dueDate||'',c.amount,d.toFixed(2)]); });
  downloadCSV(rows,'due-report.csv');
}
function openSettleModal(refType, refId){
  let party='', remaining=0;
  if(refType==='sale'){ const s=state.sales.find(function(x){ return x.id===refId; }); party=s.customer; remaining=saleDue(s); }
  if(refType==='purchase'){ const p=state.purchases.find(function(x){ return x.id===refId; }); party=p.supplier; remaining=purchaseDue(p); }
  if(refType==='credit'){ const c=state.credits.find(function(x){ return x.id===refId; }); party=c.party; remaining=creditDue(c); }
  const body =
    '<p style="font-size:13px; margin-bottom:14px">Recording a payment for <strong>'+escapeHtml(party)+'</strong> — remaining due: <strong class="mono">'+fmtNPR(remaining)+'</strong></p>'+
    '<div class="form-grid">'+
      '<div class="field"><label>Date</label><input type="date" id="stDate" value="'+todayISO()+'"></div>'+
      '<div class="field"><label>Account</label><select id="stAccount" onchange="onSettleAmountInput('+remaining+')">'+acctOptions(null,null,'Select account')+'</select></div>'+
      '<div class="field full"><label>Amount <span id="stCurLabel" class="text-dim"></span></label><input type="number" id="stAmount" min="0" step="0.01" placeholder="0.00" oninput="onSettleAmountInput('+remaining+')"></div>'+
      '<div class="field full"><label>Note <span class="text-dim">(optional)</span></label><input type="text" id="stNote"></div>'+
    '</div>'+
    '<div class="convert-note" id="stConvertNote"></div>'+
    '<div class="error-text" id="stError"></div>'+
    '<div class="form-actions"><button class="btn btn-ghost" onclick="closeModal()">Cancel</button>'+
    '<button class="btn btn-primary" onclick="submitSettlement(\''+refType+'\',\''+refId+'\','+remaining+')">'+icon('check')+' Record Payment</button></div>';
  openModal('Record Payment', body);
}
function onSettleAmountInput(remaining){
  const accId=document.getElementById('stAccount').value;
  const note=document.getElementById('stConvertNote');
  if(!accId){ note.textContent=''; return; }
  const acc=getAccount(accId);
  document.getElementById('stCurLabel').textContent='('+acc.currency+')';
  const amt=Number(document.getElementById('stAmount').value)||0;
  const nprEquiv=amt*acc.rate;
  note.textContent = (acc.currency!==baseCurrency()?('≈ '+fmtNPR(nprEquiv)+' · '):'')+'Remaining after this: '+fmtNPR(Math.max(0,remaining-nprEquiv));
}
function submitSettlement(refType, refId, remaining){
  const date=document.getElementById('stDate').value;
  const accountId=document.getElementById('stAccount').value;
  const amountNative=Number(document.getElementById('stAmount').value);
  const note=document.getElementById('stNote').value;
  const err=document.getElementById('stError');
  if(!date||!accountId){ err.textContent='Please select a date and account.'; return; }
  if(!amountNative||amountNative<=0){ err.textContent='Please enter a valid amount.'; return; }
  const acc=getAccount(accountId);
  const nprEquiv=amountNative*acc.rate;
  if(nprEquiv > remaining+0.5){ err.textContent='This exceeds the remaining due of '+fmtNPR(remaining)+'.'; return; }
  addSettlement({date:date,refType:refType,refId:refId,accountId:accountId,amountNative:amountNative,note:note});
  toast('Payment recorded','success');
  closeModal();
  renderDueReport();
}

            (state.meta.logoDataUrl ? '<img src="'+state.meta.logoDataUrl+'" alt="Logo" style="height:44px; max-width:120px; object-fit:contain; border-radius:6px; background:var(--surface-2); border:1px solid var(--border-soft); padding:4px">' : '<div style="height:44px; width:80px; border-radius:6px; background:var(--surface-2); border:1px dashed var(--border); display:flex; align-items:center; justify-content:center; font-size:10.5px; color:var(--text-faint)">No logo</div>')+
            '<button class="btn btn-sm" onclick="document.getElementById(\'logoFileInput\').click()">'+icon('upload')+' Upload Logo</button>'+
            (state.meta.logoDataUrl ? '<button class="btn btn-ghost btn-sm" onclick="removeLogo()">Remove</button>' : '')+
            '<input type="file" id="logoFileInput" accept="image/*" style="display:none" onchange="handleLogoUpload(event)">'+
          '</div><div class="hint" style="margin-top:6px">PNG or JPG, resized automatically to keep things fast.</div></div>'+
        '<div class="form-actions"><button class="btn btn-primary" onclick="saveBizName()">Save</button></div></div>'+
      '<div class="card"><div class="section-head"><h2>Backup &amp; Restore</h2><p>Your data lives only in this browser. Export regularly to avoid losing it.</p></div>'+
        '<div class="btn-group">'+
          '<button class="btn btn-primary" onclick="exportAllData()">'+icon('download')+' Export All Data (JSON)</button>'+
          '<button class="btn" onclick="document.getElementById(\'importFileInput\').click()">'+icon('upload')+' Import Data (JSON)</button>'+
          '<input type="file" id="importFileInput" accept="application/json" style="display:none" onchange="handleImportFile(event)">'+
        '</div></div>'+
      '<div class="card"><div class="section-head"><h2>Base Currency</h2><p>All reports and totals are shown in this currency.</p></div>'+
        '<div style="display:flex; align-items:center; justify-content:space-between; gap:10px">'+
          '<div><span class="currency-tag" style="font-size:13px; padding:6px 10px">'+baseCurrency()+'</span> <span style="font-size:12.5px; color:var(--text-dim); margin-left:8px">'+currencyInfo(baseCurrency()).name+'</span></div>'+
          '<button class="btn" onclick="openBaseCurrencyModal()">Change Base Currency</button>'+
        '</div></div>'+
      '<div class="card"><div class="section-head"><h2>Currency Rates</h2><p>Quick view of every account\'s current rate to '+baseCurrency()+'.</p></div>'+rateOverviewHtml()+'</div>'+
    '</div><div>'+
      '<div class="card"><div class="section-head"><h2>Appearance</h2></div>'+
        '<p style="font-size:12.5px; color:var(--text-dim); margin-bottom:10px">Current theme: <strong>'+(state.meta.theme==='dark'?'Dark':'Light')+'</strong></p>'+
        '<button class="btn btn-block" onclick="toggleThemeFromSettings()">Switch to '+(state.meta.theme==='dark'?'Light':'Dark')+' Mode</button></div>'+
      '<div class="card danger-zone"><div class="section-head"><h2>Danger Zone</h2></div>'+
        '<p style="font-size:12.5px; margin-bottom:14px">This permanently deletes every account, sale, purchase, credit and transaction from this browser. Export a backup first.</p>'+
        '<button class="btn btn-danger btn-block" onclick="resetAllData()">'+icon('trash')+' Erase All Data</button></div>'+
    '</div></div>';
}
function rateOverviewHtml(){
  const nonBase = state.accounts.filter(function(a){ return a.currency!==baseCurrency(); });
  if(!nonBase.length) return '<p style="font-size:12.5px; color:var(--text-faint)">No foreign-currency accounts yet. Add a wallet in a different currency or unit to set its rate.</p>';
  return nonBase.map(function(a){
    return '<div style="display:flex; justify-content:space-between; align-items:center; padding:9px 0; border-bottom:1px solid var(--border-soft)">'+
      '<div><span class="currency-tag">'+a.currency+'</span> <span style="font-size:13px; margin-left:6px">'+escapeHtml(a.name)+'</span></div>'+
      '<div class="mono" style="font-size:13px">1 '+a.currency+' = '+fmtNum(a.rate)+' '+baseCurrency()+' <button class="btn btn-ghost btn-sm" onclick="openAccountModal(\''+a.id+'\')" style="margin-left:8px">'+icon('edit')+'</button></div></div>';
  }).join('');
}
function toggleThemeFromSettings(){
  state.meta.theme = state.meta.theme==='dark' ? 'light' : 'dark';
  saveState(); applyTheme(); renderSettings();
}
function saveBizName(){
  state.meta.businessName = document.getElementById('setBizName').value.trim() || 'My Business';
  saveState();
  document.getElementById('brandNameDisplay').textContent = state.meta.businessName;
  toast('Business name saved','success');
}
function handleLogoUpload(evt){
  const file = evt.target.files && evt.target.files[0];
  if(!file) return;
  if(!/^image\//.test(file.type)){ toast('Please choose an image file (PNG or JPG).','error'); evt.target.value=''; return; }
  if(file.size > 5*1024*1024){ toast('That image is too large — please use one under 5MB.','error'); evt.target.value=''; return; }
  const reader = new FileReader();
  reader.onerror = function(){ toast('Could not read that file.','error'); };
  reader.onload = function(e){
    const img = new Image();
    img.onerror = function(){ toast('Could not read that image.','error'); };
    img.onload = function(){
      try{
        const maxDim = 240;
        let w = img.width || 1, h = img.height || 1;
        if(w>maxDim || h>maxDim){
          if(w>=h){ h = Math.max(1,Math.round(h*(maxDim/w))); w = maxDim; }
          else { w = Math.max(1,Math.round(w*(maxDim/h))); h = maxDim; }
        }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext('2d');
        if(!ctx) throw new Error('canvas unsupported');
        ctx.drawImage(img, 0, 0, w, h);
        state.meta.logoDataUrl = canvas.toDataURL('image/png');
        saveState();
        toast('Logo uploaded','success');
        renderSettings();
      }catch(err){
        console.error(err);
        toast('Could not process that image in this browser.','error');
      }
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
  evt.target.value='';
}
function removeLogo(){
  state.meta.logoDataUrl = null;
  saveState();
  toast('Logo removed','success');
  renderSettings();
}
function printHeaderHtml(reportTitle){
  const name = escapeHtml(state.meta.businessName || 'My Business');
  const logo = state.meta.logoDataUrl ? '<img class="print-logo" src="'+state.meta.logoDataUrl+'" alt="Logo">' : '';
  return '<div class="print-header">'+logo+
    '<div><div class="print-company">'+name+'</div>'+
    '<div class="print-report-title">'+escapeHtml(reportTitle)+'</div>'+
    '<div class="print-date">Generated '+fmtDate(todayISO())+'</div></div></div>';
}
function openBaseCurrencyModal(){
  const current = baseCurrency();
  const options = STANDARD_CURRENCIES.filter(function(c){ return c!==current; }).map(function(c){
    return '<option value="'+c+'">'+c+' — '+currencyInfo(c).name+'</option>';
  }).join('');
  const body =
    '<p style="font-size:13px; margin-bottom:14px">Your current base currency is <strong>'+current+'</strong>. Switching converts every sale, purchase and credit amount, and re-sets every account\'s exchange rate, so all reports keep balancing correctly.</p>'+
    '<div class="form-grid">'+
      '<div class="field"><label>New Base Currency</label><select id="bcNew" onchange="onBaseCurrencyPick()">'+options+'</select></div>'+
      '<div class="field"><label id="bcRateLabel">Today\'s Rate</label><input type="number" id="bcRate" step="0.0001" min="0" placeholder="0.00" oninput="onBaseCurrencyPick()"></div>'+
    '</div>'+
    '<div id="bcPreview" class="convert-note" style="margin-top:6px"></div>'+
    '<div class="help-box">'+icon('alert')+'<div>A backup of your current data downloads automatically right before this runs, just in case. This changes stored numbers — not just labels — so double-check the rate before confirming.</div></div>'+
    '<div class="error-text" id="bcError"></div>'+
    '<div class="form-actions"><button class="btn btn-ghost" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="submitBaseCurrencyChange()">Convert &amp; Switch</button></div>';
  openModal('Change Base Currency', body);
  onBaseCurrencyPick();
}
function onBaseCurrencyPick(){
  const newBase = document.getElementById('bcNew').value;
  const current = baseCurrency();
  document.getElementById('bcRateLabel').textContent = '1 '+newBase+' = ? '+current;
  document.getElementById('bcRate').placeholder = 'e.g. '+(RATE_PLACEHOLDER[newBase]||'1.00');
  const rate = Number(document.getElementById('bcRate').value);
  const preview = document.getElementById('bcPreview');
  const n = state.sales.length + state.purchases.length + state.credits.length;
  const accN = state.accounts.length;
  if(!rate || rate<=0){ preview.textContent = n+' sale/purchase/credit entries and '+accN+' account rate(s) will be converted once you enter a rate.'; return; }
  const sampleOld = 1000;
  const sampleNew = sampleOld / rate;
  preview.textContent = 'e.g. an entry of '+fmtNative(sampleOld,current)+' becomes '+fmtNative(sampleNew,newBase)+'. This will apply to '+n+' entries and '+accN+' account rate(s).';
}
function migrateBaseCurrency(newBase, referenceRate){
  // referenceRate: 1 newBase = referenceRate (old base) units.
  // Every amount already denominated in the base currency gets re-expressed in the new one.
  state.sales.forEach(function(s){ s.amount = s.amount / referenceRate; });
  state.purchases.forEach(function(p){ p.amount = p.amount / referenceRate; });
  state.credits.forEach(function(c){ c.amount = c.amount / referenceRate; });
  state.accounts.forEach(function(a){
    if(a.currency===newBase){ a.rate = 1; }
    else { a.rate = (a.rate||1) / referenceRate; }
    if(a.openingRateSnapshot!=null) a.openingRateSnapshot = (a.currency===newBase) ? 1 : (a.openingRateSnapshot / referenceRate);
  });
  // Every FROZEN rate snapshot was recorded in terms of the OLD base currency and must be
  // re-expressed in the new one too - otherwise historical COGS/P&L would silently mix currencies
  // (e.g. a frozen "165" meaning "165 NPR" would get misread as "165 USD" after switching to USD).
  // Crucially, a snapshot that belongs to an account whose currency IS the new base must become
  // exactly 1 - not divided by the reference rate - since there is no FX exposure to your own
  // reporting currency, no matter what the frozen rate happened to read historically. Applying the
  // blanket division here instead would fabricate a spurious FX gain/loss on the base-currency
  // account itself the moment the switch happens.
  // The native amounts themselves (receivedNative, payNative, fromAmount, etc.) are real physical
  // quantities and are never touched.
  function migSnapFor(accountId, v){
    if(v==null) return v;
    const acc = getAccount(accountId);
    if(acc && acc.currency===newBase) return 1;
    return v/referenceRate;
  }
  state.sales.forEach(function(s){ s.accountRateSnap = migSnapFor(s.accountId, s.accountRateSnap); s.payAccountRateSnap = migSnapFor(s.payAccountId, s.payAccountRateSnap); });
  state.purchases.forEach(function(p){ p.accountRateSnap = migSnapFor(p.accountId, p.accountRateSnap); p.receiveAccountRateSnap = migSnapFor(p.receiveAccountId, p.receiveAccountRateSnap); });
  state.credits.forEach(function(c){ c.accountRateSnap = migSnapFor(c.accountId, c.accountRateSnap); });
  state.cashTx.forEach(function(t){ t.rateSnap = migSnapFor(t.accountId, t.rateSnap); });
  state.transfers.forEach(function(t){ t.fromRateSnap = migSnapFor(t.fromAccountId, t.fromRateSnap); t.toRateSnap = migSnapFor(t.toAccountId, t.toRateSnap); });
  state.settlements.forEach(function(s){ s.rateSnap = migSnapFor(s.accountId, s.rateSnap); });
  state.meta.baseCurrency = newBase;
  saveState();
}
function submitBaseCurrencyChange(){
  const newBase = document.getElementById('bcNew').value;
  const rate = Number(document.getElementById('bcRate').value);
  const err = document.getElementById('bcError');
  if(!rate || rate<=0){ err.textContent = 'Please enter a valid rate greater than 0.'; return; }
  exportAllData();
  migrateBaseCurrency(newBase, rate);
  closeModal();
  toast('Base currency switched to '+newBase,'success');
  renderSettings();
  if(currentPage==='dashboard') renderDashboard();
}
function resetAllData(){
  if(confirm('This will permanently erase ALL data in this app. This cannot be undone. Continue?')){
    if(confirm('Are you absolutely sure? Consider exporting a backup first.')){
      state = defaultState();
      window.state = state;
      saveState();
      toast('All data erased','success');
      applyTheme();
      document.getElementById('brandNameDisplay').textContent = state.meta.businessName;
      navigateTo('dashboard');
    }
  }
}
function exportAllData(){
  const blob = new Blob([JSON.stringify(state,null,2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download='khata-backup-'+todayISO()+'.json';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(function(){ URL.revokeObjectURL(url); },1000);
  toast('Backup downloaded','success');
}
function handleImportFile(evt){
  const file = evt.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(e){
    try{
      const parsed = JSON.parse(e.target.result);
      if(!parsed || typeof parsed !== 'object' || !Array.isArray(parsed.accounts)){
        toast('This file does not look like a valid Khata backup.', 'error');
        evt.target.value=''; return;
      }
      if(!confirm('Importing will REPLACE all current data in this browser with the contents of this file. A backup of your current data will be downloaded first. Continue?')){
        evt.target.value=''; return;
      }
      exportAllData();
      const d = defaultState();
      const merged = {
        meta: Object.assign({}, d.meta, parsed.meta||{}),
        accounts: Array.isArray(parsed.accounts)?parsed.accounts:[],
        sales: Array.isArray(parsed.sales)?parsed.sales:[],
        purchases: Array.isArray(parsed.purchases)?parsed.purchases:[],
        credits: Array.isArray(parsed.credits)?parsed.credits:[],
        cashTx: Array.isArray(parsed.cashTx)?parsed.cashTx:[],
        transfers: Array.isArray(parsed.transfers)?parsed.transfers:[],
        settlements: Array.isArray(parsed.settlements)?parsed.settlements:[],
        customCategories: Object.assign({in:[],out:[]}, parsed.customCategories||{}),
      };
      if(merged.meta.theme!=='light') merged.meta.theme='dark';
      state = merged;
      window.state = state;
      saveState();
      toast('Data imported successfully','success');
      applyTheme();
      document.getElementById('brandNameDisplay').textContent = state.meta.businessName;
      navigateTo('dashboard');
    }catch(err){
      console.error(err);
      toast('Could not read that file — make sure it is a Khata JSON backup.', 'error');
    }
    evt.target.value='';
  };
  reader.readAsText(file);
}

   ============================================================ */
function tickTopbarDate(){ document.getElementById('topbarDate').textContent = fmtDate(todayISO()); }
document.getElementById('modalBack').addEventListener('click', function(e){ if(e.target.id==='modalBack') closeModal(); });
document.getElementById('hamburgerBtn').addEventListener('click', function(){
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebarOverlay').classList.toggle('show');
});
document.getElementById('sidebarOverlay').addEventListener('click', closeSidebarMobile);
document.getElementById('themeToggleBtn').addEventListener('click', function(){
  state.meta.theme = state.meta.theme==='dark' ? 'light' : 'dark';
  saveState(); applyTheme();
  if(currentPage==='settings') renderSettings();
});
document.getElementById('quickExportBtn').addEventListener('click', exportAllData);

function init(){
  applyTheme();
  document.getElementById('brandNameDisplay').textContent = state.meta.businessName;
  tickTopbarDate();
  const startPage = location.hash ? location.hash.slice(1) : 'dashboard';
  navigateTo(startPage);
}
if(document.readyState==='loading'){ document.addEventListener('DOMContentLoaded', init); } else { init(); }
</script>
